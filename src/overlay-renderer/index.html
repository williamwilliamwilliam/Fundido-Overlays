<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fundido Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    #overlay-container {
      position: absolute;
      display: flex;
    }

    .overlay-item {
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <script>
    /**
     * Overlay renderer — receives configuration and frame state from the
     * main process via IPC and renders overlays.
     *
     * Uses nodeIntegration since this is an internal window, not user content.
     */
    const { ipcRenderer } = require('electron');

    let overlayGroup = null;
    let currentFrameState = null;

    ipcRenderer.on('overlay:init', (_event, group) => {
      overlayGroup = group;
      applyGroupLayout(group);
      renderOverlayElements(group);
      // Apply defaults immediately (before any frame state arrives)
      applyDefaults(group);
    });

    ipcRenderer.on('overlay:frame-state', (_event, frameState) => {
      currentFrameState = frameState;
      if (overlayGroup) {
        evaluateRules(overlayGroup, frameState);
      }
    });

    // -----------------------------------------------------------------------
    // Layout
    // -----------------------------------------------------------------------

    function applyGroupLayout(group) {
      const container = document.getElementById('overlay-container');
      const position = group.position;

      if (position.mode === 'absolute') {
        container.style.left = position.x + 'px';
        container.style.top = position.y + 'px';
      }

      const directionMap = { right: 'row', left: 'row-reverse', down: 'column', up: 'column-reverse' };
      container.style.flexDirection = directionMap[group.growDirection] || 'row';

      const alignMap = { start: 'flex-start', center: 'center', end: 'flex-end' };
      container.style.alignItems = alignMap[group.alignment] || 'flex-start';

      container.style.gap = (group.gap || 4) + 'px';
    }

    // -----------------------------------------------------------------------
    // Rendering
    // -----------------------------------------------------------------------

    function renderOverlayElements(group) {
      const container = document.getElementById('overlay-container');
      container.innerHTML = '';

      for (const overlay of group.overlays) {
        const element = document.createElement('div');
        element.classList.add('overlay-item');
        element.dataset.overlayId = overlay.id;

        if (overlay.contentType === 'text' && overlay.textConfig) {
          renderTextOverlay(element, overlay.textConfig);
        } else if (overlay.contentType === 'image' && overlay.imageConfig) {
          renderImageOverlay(element, overlay.imageConfig);
        } else if (overlay.contentType === 'regionMirror') {
          renderRegionMirrorOverlay(element, overlay.regionMirrorConfig);
        }

        container.appendChild(element);
      }
    }

    function renderTextOverlay(element, config) {
      element.style.fontFamily = config.fontFamily || 'Segoe UI';
      element.style.fontSize = (config.fontSize || 16) + 'px';
      element.style.fontWeight = config.fontWeight || 'normal';
      element.style.fontStyle = config.fontStyle || 'normal';
      element.style.color = config.color || '#ffffff';
      element.style.backgroundColor = config.backgroundColor || 'rgba(0,0,0,0.6)';
      element.style.padding = (config.padding || 4) + 'px';
      element.style.borderRadius = '4px';
      element.style.whiteSpace = 'nowrap';
      element.textContent = config.text || '';
    }

    function renderImageOverlay(element, config) {
      if (!config || !config.filePath) return;
      const img = document.createElement('img');
      img.src = config.filePath;
      img.alt = '';

      const size = config.size || {};
      if (size.scale && size.scale !== 1.0) {
        img.style.transform = 'scale(' + size.scale + ')';
        img.style.transformOrigin = 'top left';
      }
      if (size.width) img.style.width = size.width + 'px';
      if (size.height) img.style.height = size.height + 'px';
      if (size.maxWidth) img.style.maxWidth = size.maxWidth + 'px';
      if (size.maxHeight) img.style.maxHeight = size.maxHeight + 'px';

      element.appendChild(img);
    }

    function renderRegionMirrorOverlay(element, config) {
      if (!config) return;
      const canvas = document.createElement('canvas');
      const size = config.size || {};
      canvas.width = size.width || 128;
      canvas.height = size.height || 128;
      if (size.scale) {
        canvas.style.transform = 'scale(' + size.scale + ')';
        canvas.style.transformOrigin = 'top left';
      }
      element.appendChild(canvas);
    }

    // -----------------------------------------------------------------------
    // Defaults (before any rules/frame state)
    // -----------------------------------------------------------------------

    function applyDefaults(group) {
      for (const overlay of group.overlays) {
        const element = document.querySelector('[data-overlay-id="' + overlay.id + '"]');
        if (!element) continue;

        const isVisibleByDefault = overlay.defaultVisible !== false;
        const defaultOpacity = overlay.defaultOpacity !== undefined ? overlay.defaultOpacity : 1;

        element.style.display = isVisibleByDefault ? '' : 'none';
        element.style.opacity = String(defaultOpacity);
      }
    }

    // -----------------------------------------------------------------------
    // Rules evaluation
    // -----------------------------------------------------------------------

    function evaluateRules(group, frameState) {
      for (const overlay of group.overlays) {
        const element = document.querySelector('[data-overlay-id="' + overlay.id + '"]');
        if (!element) continue;

        // Start with defaults
        const isVisibleByDefault = overlay.defaultVisible !== false;
        const defaultOpacity = overlay.defaultOpacity !== undefined ? overlay.defaultOpacity : 1;

        let resolvedVisible = isVisibleByDefault;
        let resolvedOpacity = defaultOpacity;

        // Evaluate rules top-down, first match wins
        const rules = overlay.rules || [];
        for (const rule of rules) {
          const allConditionsMet = evaluateConditions(rule.conditions, frameState);
          if (allConditionsMet) {
            if (rule.action === 'show') {
              resolvedVisible = true;
              resolvedOpacity = 1;
            } else if (rule.action === 'hide') {
              resolvedVisible = false;
            } else if (rule.action === 'opacity') {
              resolvedVisible = true;
              resolvedOpacity = rule.opacityValue !== undefined ? rule.opacityValue : 1;
            }
            break; // First match wins
          }
        }

        element.style.display = resolvedVisible ? '' : 'none';
        element.style.opacity = String(resolvedOpacity);
      }
    }

    function evaluateConditions(conditions, frameState) {
      if (!conditions || conditions.length === 0) return true;

      for (const condition of conditions) {
        const regionState = frameState.regionStates.find(
          rs => rs.monitoredRegionId === condition.monitoredRegionId
        );
        if (!regionState) return false;

        const calcResult = regionState.calculationResults.find(
          cr => cr.stateCalculationId === condition.stateCalculationId
        );
        if (!calcResult) return false;

        const currentValue = calcResult.currentValue;
        const isEquals = condition.operator === 'equals';
        const isNotEquals = condition.operator === 'notEquals';

        if (isEquals && currentValue !== condition.value) return false;
        if (isNotEquals && currentValue === condition.value) return false;
      }

      return true;
    }
  </script>
</body>
</html>
